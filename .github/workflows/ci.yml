name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Force Node 24 pour les actions JS encore packagées avec Node 20
  # (pnpm/action-setup@v4 notamment) — voir GH changelog 2025-09-19
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: leads_test
          POSTGRES_USER: leads
          POSTGRES_PASSWORD: leads
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://leads:leads@localhost:5432/leads_test
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Install web deps
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Lint (web)
        run: pnpm lint
        working-directory: web

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Test
        run: pnpm test

      - name: Audit (non-blocking)
        run: pnpm audit --prod --audit-level=high || true
