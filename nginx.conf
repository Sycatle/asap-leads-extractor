# LeadFlow - Configuration Nginx (Cloudflare SSL)
# /etc/nginx/sites-available/leads.visibee.fr

server {
    listen 80;
    server_name leads.visibee.fr;

    # ══════════════════════════════════════════════════
    # COMPRESSION
    # ══════════════════════════════════════════════════

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ══════════════════════════════════════════════════
    # SECURITY HEADERS
    # ══════════════════════════════════════════════════

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Bloquer les bots (en plus du robots.txt)
    if ($http_user_agent ~* (Googlebot|Bingbot|Slurp|DuckDuckBot|Baiduspider|YandexBot|Sogou|Exabot|ia_archiver)) {
        return 403;
    }

    # ══════════════════════════════════════════════════
    # LOGS
    # ══════════════════════════════════════════════════

    access_log /var/log/nginx/leads.visibee.fr.access.log;
    error_log /var/log/nginx/leads.visibee.fr.error.log;

    # ══════════════════════════════════════════════════
    # CACHE - Assets Next.js (hash = immutable)
    # ══════════════════════════════════════════════════

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Images optimisées Next.js
    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        expires 1M;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Fichiers statiques (public/)
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff|woff2)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 1M;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ══════════════════════════════════════════════════
    # PROXY - Next.js App
    # ══════════════════════════════════════════════════

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
